name: Build binaries

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      linux:
        description: "Build Linux"
        type: boolean
        default: true
      macos:
        description: "Build macOS"
        type: boolean
        default: true
      windows:
        description: "Build Windows"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            artifact: termdash-linux
            binary: termdash
            enabled: ${{ github.event_name != 'workflow_dispatch' || inputs.linux }}

          - name: macos
            os: macos-latest
            artifact: termdash-macos
            binary: termdash
            enabled: ${{ github.event_name != 'workflow_dispatch' || inputs.macos }}

          - name: windows
            os: windows-latest
            artifact: termdash-windows.exe
            binary: termdash.exe
            enabled: ${{ github.event_name != 'workflow_dispatch' || inputs.windows }}

    steps:
      - uses: actions/checkout@v4
        if: ${{ matrix.enabled }}

      - name: Install Linux dependencies
        if: ${{ matrix.enabled && runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++ \
            pkg-config \
            libx11-dev \
            libasound2-dev \
            libudev-dev \
            libxkbcommon-x11-0 \
            libwayland-dev \
            libxkbcommon-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            mesa-vulkan-drivers

      - name: Install Rust
        if: ${{ matrix.enabled }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: ${{ matrix.enabled }}
        uses: Swatinem/rust-cache@v2

      - name: Build
        if: ${{ matrix.enabled }}
        run: cargo build --release --locked

      - name: Prepare binary
        if: ${{ matrix.enabled }}
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"

      - name: Upload artifact
        if: ${{ matrix.enabled }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

      - name: Upload to GitHub Release
        if: ${{ matrix.enabled && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}

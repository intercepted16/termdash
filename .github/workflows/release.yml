name: Build binaries

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "level_data_macros/**"
      - "assets/**"
      - ".github/workflows/build.yml" 

  workflow_dispatch:
    inputs:
      linux:
        description: "Build Linux"
        type: boolean
        default: true
      macos:
        description: "Build macOS"
        type: boolean
        default: true
      windows:
        description: "Build Windows"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-linux:
    name: Build linux-x86_64-glibc2.31
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.linux }}
    runs-on: ubuntu-22.04
    container: ubuntu:20.04

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install Linux dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            git \
            git-lfs \
            pkg-config \
            libx11-dev \
            libasound2-dev \
            libudev-dev \
            libxkbcommon-x11-0 \
            libwayland-dev \
            libxkbcommon-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            mesa-vulkan-drivers

      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Validate LFS assets
        shell: bash
        run: |
          failed=0
          while IFS= read -r path; do
            if grep -q "git-lfs.github.com/spec" "$path"; then
              echo "$path is still a Git LFS pointer"
              failed=1
            fi
          done < <(git lfs ls-files --name-only)
          exit "$failed"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-linux-x86_64-glibc2.31
          cache-targets: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu

      - name: Prepare binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/termdash dist/termdash-linux-x86_64-glibc2.31

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: termdash-linux-x86_64-glibc2.31
          path: dist/termdash-linux-x86_64-glibc2.31

      - name: Upload to GitHub Release
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: dist/termdash-linux-x86_64-glibc2.31

  build-native:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-x86_64
            platform: macos
            os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: termdash-macos-x86_64
            binary: termdash
            enabled: ${{ github.event_name != 'workflow_dispatch' || inputs.macos }}

          - name: macos-aarch64
            platform: macos
            os: macos-14
            target: aarch64-apple-darwin
            artifact: termdash-macos-aarch64
            binary: termdash
            enabled: ${{ github.event_name != 'workflow_dispatch' || inputs.macos }}

          - name: windows-x86_64
            platform: windows
            os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: termdash-windows-x86_64.exe
            binary: termdash.exe
            enabled: ${{ github.event_name != 'workflow_dispatch' || inputs.windows }}

    steps:
      - uses: actions/checkout@v4
        if: ${{ matrix.enabled }}
        with:
          lfs: true

      - name: Validate LFS assets
        if: ${{ matrix.enabled }}
        shell: bash
        run: |
          failed=0
          while IFS= read -r path; do
            if grep -q "git-lfs.github.com/spec" "$path"; then
              echo "$path is still a Git LFS pointer"
              failed=1
            fi
          done < <(git lfs ls-files --name-only)
          exit "$failed"

      - name: Install Rust
        if: ${{ matrix.enabled }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        if: ${{ matrix.enabled }}
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
          cache-targets: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build
        if: ${{ matrix.enabled }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare binary
        if: ${{ matrix.enabled }}
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"

      - name: Upload artifact
        if: ${{ matrix.enabled }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

      - name: Upload to GitHub Release
        if: ${{ matrix.enabled && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
